<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ardatasc - talk to me</title>
<link rel="icon" href="favicon.png" type="image/x-icon">
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.min.7363202e6ba39c3b4caca8b218f6f6631256ed7a41cd2f8bf46550651b07cb31.css" integrity="">
<style>
  .cal-container {
    max-width: 820px;
    margin: 2rem auto;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .cal-left {
    flex: 1;
    min-width: 300px;
  }

  .cal-right {
    flex: 0 0 240px;
    min-width: 200px;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .cal-header h2 {
    margin: 0;
    font-size: 1.2rem;
    font-family: inter, sans-serif;
  }

  .cal-nav {
    background: none;
    border: 1px solid #555;
    color: inherit;
    font-family: inter, sans-serif;
    font-size: 1rem;
    cursor: pointer;
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }

  .cal-nav:hover {
    background: #ec5565;
    color: #fff;
    border-color: #ec5565;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    font-family: inter, sans-serif;
  }

  .cal-dow {
    text-align: center;
    font-size: 0.75rem;
    padding: 0.4rem 0;
    color: #888;
    font-weight: bold;
    text-transform: uppercase;
  }

  .cal-day {
    text-align: center;
    padding: 0.6rem 0;
    border-radius: 6px;
    cursor: default;
    font-size: 0.9rem;
    transition: background 0.12s, color 0.12s;
    user-select: none;
  }

  .cal-day.empty {
    /* empty cell */
  }

  .cal-day.past, .cal-day.unavailable {
    color: #555;
  }

  .cal-day.available {
    cursor: pointer;
    font-weight: bold;
  }

  .cal-day.available:hover {
    background: rgba(236, 85, 101, 0.2);
  }

  .cal-day.selected {
    background: #ec5565;
    color: #fff;
  }

  .cal-day.today {
    border: 1px solid #ec5565;
  }

  /* Time slots panel */
  .cal-slots-title {
    font-family: inter, sans-serif;
    font-size: 1rem;
    margin: 0 0 0.8rem;
    color: #ec5565;
  }

  .cal-slots-date {
    font-family: inter, sans-serif;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    color: #888;
  }

  .cal-slot {
    display: block;
    width: 100%;
    padding: 0.6rem 0;
    margin-bottom: 0.5rem;
    font-family: inter, sans-serif;
    font-size: 0.85rem;
    border: 1px solid #555;
    border-radius: 6px;
    background: none;
    color: inherit;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .cal-slot:hover {
    border-color: #ec5565;
    background: rgba(236, 85, 101, 0.15);
  }

  .cal-slot.selected {
    background: #ec5565;
    color: #fff;
    border-color: #ec5565;
  }

  .cal-no-slots {
    font-family: inter, sans-serif;
    font-size: 0.85rem;
    color: #666;
    font-style: italic;
  }

  .cal-placeholder {
    font-family: inter, sans-serif;
    font-size: 0.85rem;
    color: #666;
  }

  .cal-info {
    margin-bottom: 2rem;
  }

  .cal-info h1 {
    font-family: inter, sans-serif;
  }

  .cal-info p {
    font-family: inter, sans-serif;
    color: #888;
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .cal-confirm {
    display: block;
    width: 100%;
    padding: 0.7rem 0;
    margin-top: 1.2rem;
    font-family: inter, sans-serif;
    font-size: 0.9rem;
    border: none;
    border-radius: 6px;
    background: #ec5565;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    transition: opacity 0.15s;
  }

  .cal-confirm:hover {
    opacity: 0.85;
  }

  .cal-confirm:disabled {
    opacity: 0.4;
    cursor: default;
  }

  .cal-form-field {
    display: block;
    width: 100%;
    padding: 0.5rem;
    margin-bottom: 0.5rem;
    font-family: inter, sans-serif;
    font-size: 0.85rem;
    border: 1px solid #555;
    border-radius: 6px;
    background: none;
    color: inherit;
    box-sizing: border-box;
  }

  .cal-form-field::placeholder {
    color: #666;
  }

  .cal-form-field:focus {
    outline: none;
    border-color: #ec5565;
  }

  .cal-form-label {
    font-family: inter, sans-serif;
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 0.3rem;
    display: block;
  }

  .cal-form-group {
    margin-top: 1.5rem;
    max-width: 540px;
  }

  .cal-success {
    font-family: inter, sans-serif;
    font-size: 0.9rem;
    color: #ec5565;
    font-weight: bold;
    margin-bottom: 0.5rem;
  }

  .cal-success-detail {
    font-family: inter, sans-serif;
    font-size: 0.85rem;
    color: #888;
    line-height: 1.6;
  }

  .cal-error {
    font-family: inter, sans-serif;
    font-size: 0.8rem;
    color: #ec5565;
    margin-top: 0.5rem;
  }

  .cal-confirm.sending {
    opacity: 0.6;
    cursor: wait;
  }

  @media (max-width: 700px) {
    .cal-container {
      flex-direction: column;
      padding: 0 1rem;
    }
    .cal-left {
      min-width: unset;
    }
    .cal-right {
      flex: 1 1 100%;
    }
    .cal-form-group {
      max-width: 100%;
    }
    .cal-info {
      padding: 0 1rem;
    }
  }
</style>
</head>
<body>
<div class="header">
<div class="header-content">
<div class="header-content-title">
ardatasc
</div>
<div class="header-content-nav">
<div class="header-content-nav-item">
<a href="index.html">content</a>
</div>
<div class="header-content-nav-item">
<a href="about.html">about</a>
</div>
<div class="header-content-nav-item">
<a href="talktome.html">talk to me</a>
</div>
</div>
</div>
</div>

<div class="content-container-menu">
  <div class="cal-info">
    <h1>Talk to Me</h1>
    <p>Pick a date and time below to schedule a 30-minute chat.</p>
  </div>

  <div class="cal-container">
    <div class="cal-left">
      <div class="cal-header">
        <button class="cal-nav" id="prevMonth">&larr;</button>
        <h2 id="monthLabel"></h2>
        <button class="cal-nav" id="nextMonth">&rarr;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <div class="cal-right" id="slotsPanel">
      <div class="cal-placeholder">Select a date to see available times.</div>
    </div>
  </div>

  <div id="formPanel"></div>
</div>

<script>
(function () {
  const MONTH_NAMES = [
    'January', 'February', 'March', 'April', 'May', 'June',
    'July', 'August', 'September', 'October', 'November', 'December'
  ];
  const DOW = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  // Availability config: which days of the week are bookable (0=Sun ... 6=Sat)
  const AVAILABLE_DAYS = new Set([1, 2, 3, 4, 5]); // Mon-Fri

  // Time slots offered (24h format)
  const TIME_SLOTS = [
    '09:00', '09:30', '10:00', '10:30', '11:00', '11:30',
    '13:00', '13:30', '14:00', '14:30', '15:00', '15:30',
    '16:00', '16:30'
  ];

  // How many days ahead can be booked (from today)
  const MAX_ADVANCE_DAYS = 60;

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const maxDate = new Date(today);
  maxDate.setDate(maxDate.getDate() + MAX_ADVANCE_DAYS);

  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth();
  let selectedDate = null;
  let selectedSlot = null;

  const grid = document.getElementById('calGrid');
  const label = document.getElementById('monthLabel');
  const slotsPanel = document.getElementById('slotsPanel');
  const formPanel = document.getElementById('formPanel');

  function render() {
    label.textContent = MONTH_NAMES[viewMonth] + ' ' + viewYear;
    grid.innerHTML = '';

    // Day-of-week headers
    DOW.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(viewYear, viewMonth, d);
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;

      const isToday = date.getTime() === today.getTime();
      const isPast = date < today;
      const isTooFar = date > maxDate;
      const isAvailableDay = AVAILABLE_DAYS.has(date.getDay());

      if (isToday) el.classList.add('today');

      if (isPast || isTooFar || !isAvailableDay) {
        el.classList.add(isPast ? 'past' : 'unavailable');
      } else {
        el.classList.add('available');
        el.addEventListener('click', () => selectDate(date));
      }

      if (selectedDate && date.getTime() === selectedDate.getTime()) {
        el.classList.add('selected');
      }

      grid.appendChild(el);
    }
  }

  function selectDate(date) {
    selectedDate = date;
    selectedSlot = null;
    render();
    renderSlots();
  }

  function renderSlots() {
    if (!selectedDate) {
      slotsPanel.innerHTML = '<div class="cal-placeholder">Select a date to see available times.</div>';
      formPanel.innerHTML = '';
      return;
    }

    const dateStr = selectedDate.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    let html = '<div class="cal-slots-title">Available Times</div>';
    html += '<div class="cal-slots-date">' + dateStr + '</div>';

    TIME_SLOTS.forEach(slot => {
      const cls = selectedSlot === slot ? 'cal-slot selected' : 'cal-slot';
      html += '<button class="' + cls + '" data-slot="' + slot + '">' + formatTime(slot) + '</button>';
    });

    slotsPanel.innerHTML = html;

    slotsPanel.querySelectorAll('.cal-slot').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedSlot = btn.dataset.slot;
        renderSlots();
      });
    });

    renderForm();
  }

  function renderForm() {
    if (!selectedSlot) {
      formPanel.innerHTML = '';
      return;
    }

    const dateStr = selectedDate.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    let html = '<div class="cal-form-group">';
    html += '<div class="cal-slots-date" style="margin-bottom:1rem">' + dateStr + ' at ' + formatTime(selectedSlot) + '</div>';
    html += '<label class="cal-form-label">Your name</label>';
    html += '<input class="cal-form-field" type="text" id="bookName" placeholder="Jane Doe" required>';
    html += '<label class="cal-form-label">Your email</label>';
    html += '<input class="cal-form-field" type="email" id="bookEmail" placeholder="jane@example.com" required>';
    html += '<label class="cal-form-label">What do you want to chat about? (optional)</label>';
    html += '<input class="cal-form-field" type="text" id="bookTopic" placeholder="Quick intro, project idea, etc.">';
    html += '<button class="cal-confirm" id="confirmBtn">Confirm Booking</button>';
    html += '<div id="formError"></div>';
    html += '</div>';

    formPanel.innerHTML = html;

    document.getElementById('confirmBtn').addEventListener('click', () => {
      if (!selectedSlot || !selectedDate) return;

      const nameEl = document.getElementById('bookName');
      const emailEl = document.getElementById('bookEmail');
      const topicEl = document.getElementById('bookTopic');
      const errorEl = document.getElementById('formError');
      const confirmBtn = document.getElementById('confirmBtn');

      if (!nameEl.value.trim() || !emailEl.value.trim()) {
        errorEl.innerHTML = '<div class="cal-error">Please fill in your name and email.</div>';
        return;
      }

      const fullDateStr = selectedDate.toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
      });

      confirmBtn.disabled = true;
      confirmBtn.textContent = 'Sending...';
      confirmBtn.classList.add('sending');

      fetch('https://formspree.io/f/mzdklzeg', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          name: nameEl.value.trim(),
          email: emailEl.value.trim(),
          topic: topicEl.value.trim() || '(none)',
          date: fullDateStr,
          time: formatTime(selectedSlot),
          _subject: 'Talk to Me: ' + nameEl.value.trim() + ' on ' + fullDateStr + ' at ' + formatTime(selectedSlot)
        })
      })
      .then(res => {
        if (res.ok) {
          formPanel.innerHTML =
            '<div class="cal-form-group">' +
            '<div class="cal-success">Booked!</div>' +
            '<div class="cal-success-detail">' + fullDateStr + '<br>' + formatTime(selectedSlot) + '</div>' +
            '<div class="cal-success-detail" style="margin-top:1rem">I\'ll follow up at <strong>' + emailEl.value.trim() + '</strong> to confirm.</div>' +
            '</div>';
          selectedDate = null;
          selectedSlot = null;
          slotsPanel.innerHTML = '<div class="cal-placeholder">Select a date to see available times.</div>';
          render();
        } else {
          throw new Error('Submission failed');
        }
      })
      .catch(() => {
        confirmBtn.disabled = false;
        confirmBtn.textContent = 'Confirm Booking';
        confirmBtn.classList.remove('sending');
        errorEl.innerHTML = '<div class="cal-error">Something went wrong. Try again or email me directly.</div>';
      });
    });
  }

  function formatTime(t) {
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hour = h % 12 || 12;
    return hour + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  }

  document.getElementById('prevMonth').addEventListener('click', () => {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    render();
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    render();
  });

  render();
})();
</script>
</body>
</html>
